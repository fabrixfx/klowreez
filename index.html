<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>klowreez.fun | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f0f2; /* Очень светлый серый фон страницы */
            --glass-bg: rgba(255, 255, 255, 0.6); /* Белый, полупрозрачный для стекла */
            --text-color: #111111; /* Почти черный текст */
            --border-color: rgba(0, 0, 0, 0.08); /* Едва заметная темная рамка */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            /* Красивый градиент на фоне для глубины */
            background-image: 
                radial-gradient(at 10% 10%, rgba(165, 204, 57, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(0, 0, 0, 0.05) 0px, transparent 50%);
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            overflow: hidden;
        }

        /* Центрированная карточка с эффектом блюра */
        .glass-card {
            background: var(--glass-bg);
            /* Тот самый эффект матового стекла */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            
            /* Плавное появление при загрузке */
            animation: cardAppear 1s ease-out;
            
            /* Ограничим максимальную ширину */
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        p {
            font-size: 16px;
            color: rgba(0, 0, 0, 0.6);
            margin: 0 0 30px 0;
            font-weight: 300;
        }

        /* Стили для картинки по центру */
        .center-image {
            max-width: 100%; /* Чтобы не вылезала за пределы */
            height: auto;
            border-radius: 12px; /* Мягкие углы у картинки */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            display: block;
            margin: 0 auto; /* Центрирование */
        }

        /* Анимация появления */
        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>klowreez.fun</h1>
        <p>хаххаахха</p>
        
        <img src="logo.png" alt="Dashboard Visual" class="center-image">
    </div>

</body>
</html>
