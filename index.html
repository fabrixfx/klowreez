<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>klowreez CS2</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 90%; /* Ограничиваем ширину, чтобы текст не прилипал к краям */
        }

        h1 {
            /* Уменьшили мин и макс значения для комфорта на телефонах */
            font-size: clamp(2.2rem, 8vw, 5rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -2px;
            text-align: center;
            line-height: 0.9;
            word-break: break-word; /* Чтобы длинные слова не вылезали за края */
        }

        .info-text {
            color: #666666;
            /* Шрифты чуть меньше, чтобы оставить воздух */
            font-size: clamp(0.8rem, 3vw, 1rem);
            margin-top: 12px;
            font-weight: 400;
            text-align: center;
        }

        footer {
            margin-bottom: 20px;
            color: #222222;
            font-size: 0.7rem;
            font-weight: 400;
            user-select: none;
        }
    </style>
</head>
<body>

    <main>
        <h1>klowreez CS2</h1>
        <p class="info-text">The first wave of invites will be on March 22nd at 19:00 CET</p>
    </main>

    <footer>
        &copy; 2026 all rights reserved by e2wav
    </footer>

</body>
</html>
