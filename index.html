<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>klowreez.fun</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Блокировщик кликов для всего, кроме ссылок */
        .click-blocker {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 999;
            cursor: default;
        }

        .nav {
            position: fixed;
            top: 25px;
            display: flex;
            gap: 15px;
            z-index: 1000; /* Выше блокировщика */
            align-items: center;
        }

        .nav-item {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 10px 18px;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            user-select: none;
            transition: all 0.3s ease;
            pointer-events: none; /* Кнопки не кликаются */
        }

        /* Анимации наведения для кнопок (всё еще работают через прозрачность нава) */
        .nav:hover .nav-item.funny:hover { color: #fff; animation: shake 0.2s infinite; }
        .nav:hover .nav-item.buy:hover { color: #ff4d4d; border-color: #ff4d4d; transform: scale(1.08); }

        /* CHANGELOG как текстовая ссылка */
        .changelog-link {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 12px;
            transition: 0.3s;
            pointer-events: auto; /* РАЗРЕШАЕМ КЛИК */
            cursor: pointer;
            margin-left: 5px;
        }

        .changelog-link:hover {
            color: #0088cc;
            text-decoration: underline;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            text-align: center;
            max-width: 440px;
            width: 85%;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            animation: cardAppear 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        h1 {
            font-size: clamp(32px, 9vw, 44px);
            font-weight: 700;
            margin: 0;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff 40%, #555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            margin: 10px 0 30px 0;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .main-img {
            width: 100%;
            height: auto;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-1px, -1px) rotate(-0.5deg); }
            50% { transform: translate(-2px, 0px) rotate(0.5deg); }
            75% { transform: translate(2px, 1px) rotate(0deg); }
            100% { transform: translate(1px, -1px) rotate(0.5deg); }
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .nav { flex-direction: column; top: 10px; gap: 5px; }
            .nav-item { padding: 6px 12px; font-size: 10px; }
            .card { margin-top: 80px; }
        }
    </style>
</head>
<body>

    <div class="click-blocker"></div>

    <nav class="nav">
        <div class="nav-item funny">Смешные картинки</div>
        <div class="nav-item buy">Приобрести гамно</div>
        <a href="https://t.me/vibrossklow" target="_blank" class="changelog-link">Changelog</a>
    </nav>

    <div class="card">
        <h1>klowreez.fun</h1>
        <div class="desc">Картинка обновляется раз в никогда</div>
        <img src="logo1.png" alt="content loading..." class="main-img">
    </div>

</body>
</html>
