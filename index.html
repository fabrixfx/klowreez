<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>klowreez.fun</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-hover: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            /* Радиальный градиент для объема на фоне */
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden; /* Запрет прокрутки */
        }

        /* Невидимый слой, который блокирует клики, но оставляет наведение */
        .click-blocker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            cursor: default;
        }

        /* Навигация */
        .nav {
            position: fixed;
            top: 25px;
            display: flex;
            gap: 12px;
            z-index: 100;
            width: 90%;
            justify-content: center;
        }

        .nav-item {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 10px 20px;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            font-weight: 400;
            transition: all 0.3s ease;
            white-space: nowrap;
            user-select: none;
        }

        /* Эффект при наведении на "Смешные картинки" (Тряска) */
        .nav-item:first-child:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
            animation: shake 0.2s infinite;
        }

        /* Эффект при наведении на "Приобрести гамно" (Красное свечение) */
        .nav-item:last-child:hover {
            background: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
            border-color: #ff4d4d;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.2);
            transform: scale(1.08);
        }

        /* Карточка */
        .card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            text-align: center;
            max-width: 440px;
            width: 85%;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            animation: cardAppear 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: clamp(32px, 9vw, 44px);
            font-weight: 700;
            margin: 0;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff 40%, #555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            margin: 10px 0 30px 0;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Картинка по центру */
        .main-img {
            width: 100%;
            height: auto;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: transform 0.6s ease;
        }

        .main-img:hover {
            transform: scale(1.02);
        }

        /* Анимации */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-1px, -1px) rotate(-0.5deg); }
            50% { transform: translate(-2px, 0px) rotate(0.5deg); }
            75% { transform: translate(2px, 1px) rotate(0deg); }
            100% { transform: translate(1px, -1px) rotate(0.5deg); }
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Мобильная адаптация */
        @media (max-width: 480px) {
            .nav { top: 20px; gap: 8px; }
            .nav-item { padding: 9px 15px; font-size: 11px; }
            .card { padding: 25px; width: 88%; margin-top: 40px; }
            h1 { letter-spacing: -1px; }
            .desc { letter-spacing: 1px; font-size: 10px; }
        }

        /* Фоновый декор (точки) */
        .bg-dots {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="click-blocker"></div>

    <div class="bg-dots"></div>

    <nav class="nav">
        <div class="nav-item">Смешные картинки</div>
        <div class="nav-item">Приобрести гамно</div>
    </nav>

    <div class="card">
        <h1>klowreez.fun</h1>
        <div class="desc">Картинка обновляется раз в никогда нах</div>
        
        <img src="logo1.png" alt="content loading..." class="main-img">
    </div>

</body>
</html>
